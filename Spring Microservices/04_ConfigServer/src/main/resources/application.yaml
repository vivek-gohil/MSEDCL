server:
    port: 8071

spring:
    application:
        name: "configserver"

    profiles:
        active: git

    cloud:
        config:
            server:
                git:
                    uri: https://github.com/vivek-gohil/banking-config-repo
                    default-label: main
                    timeout: 5
                    clone-on-start: true #copy github repo on startup of application
                    force-pull: true
management:
    endponts:
        web:
            exposure:
                include: "*"
