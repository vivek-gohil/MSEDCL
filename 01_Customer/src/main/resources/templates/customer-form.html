<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Customer Form</title>
</head>
<body>

	<h2>Add Customer</h2>
	<form th:action="@{/customers}" th:object="${customer}" method="post">

		<!-- Name -->
		<div>
			<label>Name:</label><br /> <input type="text" th:field="*{name}" />
			<div th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
		</div>

		<br />

		<!-- Email -->
		<div>
			<label>Email:</label><br /> <input type="email" th:field="*{email}" />
			<div th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
		</div>

		<br />

		<!-- Mobile Number -->
		<div>
			<label>Mobile Number:</label><br /> <input type="text"
				th:field="*{mobileNumber}" />
			<div th:if="${#fields.hasErrors('mobileNumber')}"
				th:errors="*{mobileNumber}"></div>
		</div>

		<br />

		<button type="submit">Save Customer</button>

	</form>

</body>
</html>
