spring:
    application:
        name: TRANSACTION-SERVICE
    datasource:
        url: jdbc:mysql://localhost:3306/transaction_db
        username: root
        password: root123
        driver-class-name: com.mysql.cj.jdbc.Driver

server:
    port: 8383

logging:
    file:
        name: logs/transaction.log
management:
    endpoints:
        web:
            base-path: /actuator
            exposure:
                include: health,info,metrics,env,beans,mappings,accountype-metrics

    endpoint:
        health:
            show-details: always
            show-components: always

    health:
        defaults:
            enabled: true

    info:
        env:
            enabled: true
